<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Companion</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #06070d;
    --bg-grad: radial-gradient(ellipse at top, #0d1421 0%, #06070d 60%);
    --panel: rgba(20, 28, 48, 0.5);
    --panel-border: rgba(120, 200, 255, 0.18);
    --cyan: #5ad8ff;
    --magenta: #ff5ad8;
    --amber: #ffc15a;
    --green: #5fffb1;
    --text: #e8eef7;
    --muted: #6c7a96;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    background: var(--bg-grad);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.015) 0px,
      rgba(255,255,255,0.015) 1px,
      transparent 1px,
      transparent 3px);
    z-index: 1000;
  }

  /* Layout: 3 columns + header. Transcript on the left gets a full
     viewport-height column so chat history has room to breathe. */
  .app {
    display: grid;
    grid-template-columns: 340px 1fr 320px;
    grid-template-rows: auto 1fr;
    grid-template-areas:
      "topbar topbar topbar"
      "convo  stage  memo";
    gap: 16px;
    padding: 20px;
    height: 100vh;
    min-height: 0;
  }
  .topbar           { grid-area: topbar; }
  .conversation-pane { grid-area: convo; }
  .stage-pane       { grid-area: stage; }
  .memory-pane      { grid-area: memo; }

  .conversation-pane,
  .memory-pane,
  .stage-pane {
    display: flex; flex-direction: column; gap: 12px;
    min-height: 0;  /* permits child flex/overflow inside grid */
  }

  .stage-pane { gap: 16px; }
  .conversation-pane h2,
  .memory-pane h2 { flex: 0 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap;
    padding: 4px 0;
  }
  .brand {
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.4em;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 24px rgba(90,216,255,0.3);
  }
  .pill {
    padding: 4px 12px;
    border: 1px solid var(--panel-border);
    border-radius: 99px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--panel);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: var(--muted);
    transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .pill::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 8px currentColor;
  }
  .pill.status-idle      { color: var(--muted); }
  .pill.status-ready     { color: var(--cyan);    border-color: rgba(90,216,255,0.4); box-shadow: 0 0 16px rgba(90,216,255,0.2); }
  .pill.status-recording { color: var(--amber);   border-color: rgba(255,193,90,0.5); box-shadow: 0 0 24px rgba(255,193,90,0.4); animation: blink 1s infinite; }
  .pill.status-submitting,
  .pill.status-thinking  { color: var(--magenta); border-color: rgba(255,90,216,0.5); box-shadow: 0 0 24px rgba(255,90,216,0.4); }
  .pill.status-speaking  { color: var(--green);   border-color: rgba(95,255,177,0.5); box-shadow: 0 0 24px rgba(95,255,177,0.4); }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  /* Mode toggle (open mic / push-to-talk) */
  .mode-toggle {
    display: inline-flex;
    border: 1px solid var(--panel-border);
    border-radius: 99px;
    padding: 3px;
    background: var(--panel);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    margin-left: auto;
  }
  .mode-btn {
    padding: 5px 14px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 99px;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active {
    background: linear-gradient(135deg, rgba(90,216,255,0.18), rgba(255,90,216,0.12));
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(90,216,255,0.25);
  }

  /* Main column */
  main {
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 16px;
    min-width: 0;
  }

  /* Stage: visualizer + camera thumbnail. Fills the available height in
     the center column. */
  .stage {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1 1 auto;
    min-height: 0;
    isolation: isolate;
  }
  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 20%, rgba(90,216,255,0.12), transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(255,90,216,0.10), transparent 50%);
    z-index: -1;
  }

  .stage { min-height: 320px; }

  /* Avatar wrap — holds both characters; only the active one is shown */
  .avatar-wrap {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .avatar {
    width: min(70%, 520px);
    height: auto;
    max-height: 90%;
    display: none;
  }
  .avatar-wrap[data-character="rocky"] .avatar-rocky { display: block; }
  .avatar-wrap[data-character="hana"]  .avatar-hana  { display: block; }

  /* Avatar parts — every animatable property gets a smooth transition */
  .avatar .halo {
    transform-origin: 160px 160px;
    animation: halo-breathe 4s ease-in-out infinite;
  }
  @keyframes halo-breathe {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50%      { opacity: 1.0; transform: scale(1.05); }
  }

  /* Smooth animation defaults on parts */
  .avatar * {
    transition: opacity 0.28s ease, transform 0.32s cubic-bezier(.5,1.6,.4,1),
                stroke-width 0.28s ease;
  }

  .avatar .eye .pupil   { transform-box: fill-box; transform-origin: center; }
  .avatar .eye .sparkle { transform-box: fill-box; transform-origin: center; }
  .avatar .brow         { transform-box: fill-box; transform-origin: center; }

  /* Mouth shapes: only ONE visible at a time. Default = neutral. */
  .avatar .mouth-group { transform-origin: 160px 240px; transform: scaleY(var(--mouth-open, 1)); }
  .avatar .mouth-group > path { opacity: 0; transition: opacity 0.25s ease; }
  .avatar .mouth-group .m-neutral { opacity: 1; }

  .avatar-wrap[data-emotion="happy"]    .mouth-group .m-neutral { opacity: 0; }
  .avatar-wrap[data-emotion="happy"]    .mouth-group .m-happy   { opacity: 1; }
  .avatar-wrap[data-emotion="amaze"]    .mouth-group .m-neutral { opacity: 0; }
  .avatar-wrap[data-emotion="amaze"]    .mouth-group .m-amaze   { opacity: 1; }
  .avatar-wrap[data-emotion="sad"]      .mouth-group .m-neutral { opacity: 0; }
  .avatar-wrap[data-emotion="sad"]      .mouth-group .m-sad     { opacity: 1; }
  .avatar-wrap[data-emotion="confused"] .mouth-group .m-neutral { opacity: 0; }
  .avatar-wrap[data-emotion="confused"] .mouth-group .m-confused{ opacity: 1; }
  .avatar-wrap[data-emotion="sleepy"]   .mouth-group .m-neutral { opacity: 0; }
  .avatar-wrap[data-emotion="sleepy"]   .mouth-group .m-sleepy  { opacity: 1; }
  .avatar-wrap[data-emotion="thinking"] .mouth-group .m-neutral { opacity: 0; }
  .avatar-wrap[data-emotion="thinking"] .mouth-group .m-confused{ opacity: 1; }
  .avatar-wrap[data-emotion="curious"]  .mouth-group .m-neutral { opacity: 0; }
  .avatar-wrap[data-emotion="curious"]  .mouth-group .m-confused{ opacity: 1; }

  /* Eye-arc and eye-line elements: revealed for happy (^_^) and sleepy (--) */
  .avatar .eye-arc, .avatar .eye-line { stroke-width: 0; }
  .avatar-wrap[data-emotion="happy"]   .pupil   { transform: scale(0.0); }
  .avatar-wrap[data-emotion="happy"]   .sparkle { opacity: 0; }
  .avatar-wrap[data-emotion="happy"]   .eye-arc { stroke-width: 5; }
  .avatar-wrap[data-emotion="sleepy"]  .pupil   { transform: scale(0.0); }
  .avatar-wrap[data-emotion="sleepy"]  .sparkle { opacity: 0; }
  .avatar-wrap[data-emotion="sleepy"]  .eye-line{ stroke-width: 4; }

  /* AMAZE — eyes open very wide, pupils huge, sparkles appear */
  .avatar-wrap[data-emotion="amaze"]   .pupil   { transform: scale(1.5); }
  .avatar-wrap[data-emotion="amaze"]   .sparkle { transform: scale(1.4); }
  .avatar-wrap[data-emotion="amaze"]   .brow    { transform: translateY(-12px); }
  .avatar-wrap[data-emotion="amaze"]   .bling > path { opacity: 1; animation: sparkle 1.2s ease-in-out infinite; }
  .avatar-wrap[data-emotion="amaze"]   .halo    { animation-duration: 1.8s; }
  @keyframes sparkle {
    0%, 100% { transform: scale(0.7); opacity: 0.6; }
    50%      { transform: scale(1.2); opacity: 1; }
  }

  /* SAD — droopy brows (inverted slope), tear, smaller pupils */
  .avatar-wrap[data-emotion="sad"]     .pupil      { transform: scale(0.7); }
  .avatar-wrap[data-emotion="sad"]     .pupil      { opacity: 0.7; }
  .avatar-wrap[data-emotion="sad"]     .brow-left  { transform: translateY(2px) rotate(14deg); }
  .avatar-wrap[data-emotion="sad"]     .brow-right { transform: translateY(2px) rotate(-14deg); }
  .avatar-wrap[data-emotion="sad"]     .tear       { opacity: 1; animation: tear-fall 2s ease-in-out infinite; }
  @keyframes tear-fall {
    0%, 100% { transform: translateY(0); opacity: 1; }
    50%      { transform: translateY(15px); opacity: 0.7; }
  }

  /* CONFUSED / THINKING — asymmetric brows */
  .avatar-wrap[data-emotion="confused"] .brow-left  { transform: translateY(-6px) rotate(-12deg); }
  .avatar-wrap[data-emotion="confused"] .brow-right { transform: translateY(3px) rotate(10deg); }
  .avatar-wrap[data-emotion="thinking"] .brow-left  { transform: translateY(-5px) rotate(8deg); }
  .avatar-wrap[data-emotion="thinking"] .pupil      { transform: translate(4px, -3px) scale(0.95); }

  /* CURIOUS — head-tilt + raised brow */
  .avatar-wrap[data-emotion="curious"]  .avatar    { transform: rotate(-4deg); transition: transform 0.4s ease; }
  .avatar-wrap[data-emotion="curious"]  .brow-left { transform: translateY(-7px) rotate(-8deg); }
  .avatar-wrap[data-emotion="curious"]  .pupil     { transform: translate(2px, -2px); }

  /* Default (neutral) — gentle smile, eyes forward */
  .avatar-wrap[data-emotion="neutral"]  .pupil     { transform: scale(1); }

  /* Idle blink — toggles a tiny scaleY on the pupils every few seconds */
  .avatar .pupil { animation: blink 6s ease-in-out infinite; }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    94%           { transform: scaleY(0.05); }
    96%           { transform: scaleY(1); }
  }
  .avatar-wrap[data-emotion="happy"]  .pupil,
  .avatar-wrap[data-emotion="sleepy"] .pupil { animation: none; }

  /* Character picker in the header */
  .char-picker {
    display: inline-flex;
    border: 1px solid var(--panel-border);
    border-radius: 99px;
    padding: 3px;
    background: var(--panel);
    backdrop-filter: blur(6px);
    margin-left: 8px;
  }
  .char-btn {
    padding: 5px 14px;
    background: transparent; border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 11px; letter-spacing: 0.18em;
    cursor: pointer; border-radius: 99px;
    transition: all 0.2s;
  }
  .char-btn:hover { color: var(--text); }
  .char-btn.active {
    background: linear-gradient(135deg, rgba(90,216,255,0.2), rgba(255,90,216,0.15));
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(90,216,255,0.3);
  }

  /* Camera thumbnail */
  .cam-thumb {
    position: absolute;
    top: 16px; right: 16px;
    width: 160px; height: 120px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--panel-border);
    background: #000;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .cam-thumb video {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror, like a video call */
  }
  .cam-label {
    position: absolute; bottom: 4px; left: 6px;
    font-size: 9px; letter-spacing: 0.2em;
    color: var(--cyan);
    text-shadow: 0 0 4px rgba(0,0,0,0.9);
  }

  /* Transcript stream — chat history. Lives in its own left column and
     fills the available vertical space; scrolls smoothly. */
  .transcript {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 16px 20px;
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    scroll-behavior: smooth;
    display: flex; flex-direction: column; gap: 10px;
    font-size: 14px; line-height: 1.5;
  }
  .transcript::-webkit-scrollbar { width: 6px; }
  .transcript::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }
  .empty {
    color: var(--muted);
    text-align: center;
    padding: 24px 0;
    font-style: italic;
    font-size: 13px;
  }
  .turn { display: flex; flex-direction: column; gap: 4px; }
  .turn .you, .turn .rocky {
    padding: 8px 12px;
    border-radius: 10px;
    word-wrap: break-word;
    max-width: 88%;
  }
  .turn .you {
    align-self: flex-end;
    background: rgba(90,216,255,0.10);
    border: 1px solid rgba(90,216,255,0.25);
    color: var(--text);
  }
  .turn .you .label { color: var(--cyan); font-size: 10px; letter-spacing: 0.2em; margin-right: 8px; }
  .turn .rocky {
    align-self: flex-start;
    background: rgba(255,90,216,0.08);
    border: 1px solid rgba(255,90,216,0.22);
  }
  .turn .rocky .label { color: var(--magenta); font-size: 10px; letter-spacing: 0.2em; margin-right: 8px; }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: stretch;
  }
  #talk-btn {
    padding: 18px 24px;
    background: linear-gradient(135deg, rgba(90,216,255,0.15), rgba(255,90,216,0.15));
    color: var(--cyan);
    border: 1px solid rgba(90,216,255,0.45);
    border-radius: 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 0 24px rgba(90,216,255,0.15);
  }
  #talk-btn:hover {
    background: linear-gradient(135deg, rgba(90,216,255,0.25), rgba(255,90,216,0.25));
    box-shadow: 0 0 32px rgba(90,216,255,0.3);
  }
  #talk-btn:active { transform: scale(0.98); }
  #talk-btn.recording {
    color: var(--amber);
    border-color: rgba(255,193,90,0.7);
    background: linear-gradient(135deg, rgba(255,193,90,0.2), rgba(255,90,90,0.2));
    box-shadow: 0 0 32px rgba(255,193,90,0.4);
    animation: blink 1s infinite;
  }
  #talk-btn:disabled {
    color: var(--muted);
    border-color: rgba(108,122,150,0.3);
    background: rgba(20,28,48,0.4);
    cursor: not-allowed;
    box-shadow: none;
    animation: none;
  }

  .meter {
    width: 12px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }
  .meter-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 0%;
    background: linear-gradient(0deg, var(--green), var(--amber) 70%, var(--magenta));
    transition: height 0.05s;
  }

  /* Reusable card style for grouped content in side panes */
  .pane-card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
    min-height: 0;
  }
  /* Shared section heading style for sidebars + transcript */
  .pane-card h2,
  .conversation-pane h2,
  .memory-pane h2 {
    margin: 0;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--cyan);
    text-shadow: 0 0 8px rgba(90,216,255,0.4);
  }
  /* Memory pane wraps its content in a flex column. */
  .memory-pane > .pane-card { flex: 0 0 auto; }
  .memory-pane > .pane-card.memories-card { flex: 1 1 auto; overflow: hidden; }
  .memory-count {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.15em;
  }
  .memory-list {
    display: flex; flex-direction: column; gap: 8px;
    overflow-y: auto;
    overscroll-behavior: contain;
    flex: 1 1 auto;
    min-height: 0;
    padding-right: 4px;
  }
  .memory-list::-webkit-scrollbar { width: 4px; }
  .memory-list::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }
  .memory {
    padding: 10px 12px;
    background: rgba(20,28,48,0.6);
    border: 1px solid rgba(120,200,255,0.12);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.4;
    transition: all 0.2s;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .memory:hover { border-color: rgba(90,216,255,0.3); }
  .memory-thumb {
    width: 44px; height: 44px;
    border-radius: 6px;
    object-fit: cover;
    border: 1px solid rgba(120,200,255,0.2);
    flex-shrink: 0;
    background: #1a1a1d;
  }
  .memory-fact { flex: 1; min-width: 0; }
  .memory.new {
    background: linear-gradient(90deg, rgba(95,255,177,0.18), rgba(90,216,255,0.1));
    border-color: rgba(95,255,177,0.5);
    color: var(--green);
    animation: chip-in 1.5s ease-out;
    box-shadow: 0 0 16px rgba(95,255,177,0.2);
  }
  @keyframes chip-in {
    0%   { transform: translateX(12px); opacity: 0; box-shadow: 0 0 32px rgba(95,255,177,0.6); }
    100% { transform: translateX(0);    opacity: 1; box-shadow: 0 0 16px rgba(95,255,177,0.2); }
  }
  .empty-mem {
    color: var(--muted);
    font-size: 11px;
    font-style: italic;
    text-align: center;
    padding: 16px 0;
  }

  /* Adaptive panel */
  .adapt-card {
    background: linear-gradient(135deg, rgba(90,216,255,0.08), rgba(255,90,216,0.05));
    border: 1px solid rgba(255,90,216,0.25);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 4px;
  }
  .adapt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .adapt-header h2 { color: var(--magenta); text-shadow: 0 0 8px rgba(255,90,216,0.4); }
  .adapt-pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--magenta); box-shadow: 0 0 10px var(--magenta);
    opacity: 0.5;
  }
  .adapt-pulse.flash { animation: adapt-flash 1.2s ease-out; }
  @keyframes adapt-flash {
    0%   { opacity: 1; transform: scale(1.6); box-shadow: 0 0 24px var(--magenta); }
    100% { opacity: 0.5; transform: scale(1); box-shadow: 0 0 10px var(--magenta); }
  }
  .adapt-rows { display: flex; flex-direction: column; gap: 4px; }
  .adapt-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; padding: 4px 0;
  }
  .adapt-key { color: var(--muted); letter-spacing: 0.15em; }
  .adapt-val { color: var(--cyan); font-weight: 700; }
  .adapt-val.changed { animation: adapt-val-flash 1.5s ease-out; }
  .adapt-val.small { font-size: 10px; font-weight: 500; opacity: 0.85; }
  @keyframes adapt-val-flash {
    0%   { color: var(--green); transform: scale(1.2); }
    100% { color: var(--cyan); transform: scale(1); }
  }

  /* Adaption Labs corpus card */
  .adapt-corpus {
    background: linear-gradient(135deg, rgba(255,193,90,0.08), rgba(95,255,177,0.05));
    border-color: rgba(95,255,177,0.25);
  }
  .adapt-corpus h2 { color: var(--green); text-shadow: 0 0 8px rgba(95,255,177,0.4); }
  .corpus-status {
    font-size: 10px; letter-spacing: 0.15em;
    padding: 2px 8px; border-radius: 99px;
    border: 1px solid rgba(108,122,150,0.4);
    color: var(--muted);
    text-transform: uppercase;
  }
  .corpus-status.uploading,
  .corpus-status.running {
    color: var(--amber); border-color: rgba(255,193,90,0.5);
    animation: blink 1.2s infinite;
  }
  .corpus-status.completed {
    color: var(--green); border-color: rgba(95,255,177,0.5);
  }
  .corpus-status.failed {
    color: #ff7777; border-color: rgba(255,90,90,0.5);
  }
  .corpus-btn {
    margin-top: 10px; width: 100%;
    padding: 8px 12px;
    background: linear-gradient(135deg, rgba(95,255,177,0.15), rgba(90,216,255,0.10));
    color: var(--green);
    border: 1px solid rgba(95,255,177,0.4);
    border-radius: 8px;
    font-family: inherit;
    font-size: 11px; font-weight: 700; letter-spacing: 0.25em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .corpus-btn:hover {
    background: linear-gradient(135deg, rgba(95,255,177,0.25), rgba(90,216,255,0.18));
    box-shadow: 0 0 16px rgba(95,255,177,0.3);
  }
  .corpus-btn:active { transform: scale(0.98); }
  .corpus-btn:disabled {
    color: var(--muted); border-color: rgba(108,122,150,0.3);
    background: rgba(20,28,48,0.4);
    cursor: not-allowed;
  }

  /* Corpus mini status pill in the header (now a button: click to adapt) */
  .corpus-mini {
    margin-left: 8px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border: 1px solid rgba(95,255,177,0.25);
    border-radius: 99px;
    background: rgba(95,255,177,0.05);
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--muted);
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .corpus-mini:hover {
    background: rgba(95,255,177,0.15);
    box-shadow: 0 0 14px rgba(95,255,177,0.25);
  }
  .corpus-mini:disabled {
    opacity: 0.5; cursor: not-allowed;
  }
  .corpus-mini-label { color: var(--green); font-weight: 700; }
  .corpus-mini-count { color: var(--cyan); font-weight: 700; min-width: 1ch; }
  .corpus-mini .corpus-status { padding: 0; border: none; background: transparent; }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .lightbox[hidden] { display: none; }
  .lightbox-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    pointer-events: auto;
  }
  .lightbox-card {
    position: relative; z-index: 1;
    max-width: 720px; width: 90vw;
    background: linear-gradient(135deg, rgba(20,28,48,0.95), rgba(10,15,30,0.95));
    border: 1px solid rgba(120,200,255,0.3);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    pointer-events: auto;
    animation: lightbox-in 0.25s ease-out;
  }
  @keyframes lightbox-in {
    0% { transform: scale(0.94); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .lightbox-close {
    position: absolute; top: 12px; right: 12px;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(108,122,150,0.2); color: var(--text);
    border: 1px solid rgba(120,200,255,0.2);
    font-size: 22px; line-height: 1; cursor: pointer;
  }
  .lightbox-close:hover { background: rgba(255,90,90,0.3); border-color: rgba(255,90,90,0.5); }
  .lightbox-img {
    width: 100%; max-height: 60vh; object-fit: contain;
    border-radius: 8px; background: #000;
    border: 1px solid var(--panel-border);
  }
  .lightbox-meta { margin-top: 14px; }
  .lightbox-fact { font-size: 16px; color: var(--text); margin-bottom: 6px; }
  .lightbox-when { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

  /* Make memory cards feel clickable */
  .memory { cursor: pointer; position: relative; }
  .memory:active { transform: scale(0.98); }
  .memory.no-image { cursor: default; }
  .memory.no-image:active { transform: none; }

  /* Per-memory delete (×) button */
  .memory-x {
    background: rgba(255,90,90,0.0);
    color: var(--muted);
    border: none;
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer;
    font-size: 14px; line-height: 1;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .memory:hover .memory-x { color: #ff7777; }
  .memory-x:hover { background: rgba(255,90,90,0.2); color: #ffaaaa; }

  /* CLEAR ALL button next to MEMORIES count */
  .mem-clear {
    background: transparent;
    color: var(--muted);
    border: 1px solid rgba(255,90,90,0.3);
    border-radius: 99px;
    padding: 2px 10px;
    font-size: 9px; letter-spacing: 0.2em; font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mem-clear:hover {
    background: rgba(255,90,90,0.15);
    color: #ff9999;
    border-color: rgba(255,90,90,0.5);
  }
  .mem-clear:disabled {
    opacity: 0.3; cursor: not-allowed;
  }

  /* Talk button row inside left-controls — horizontal mic meter beside button */
  .talk-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: stretch;
    transition: opacity 0.2s;
  }
  /* In OPEN MIC mode, TALK is unnecessary; gray it out (still works as
     manual override but visually dimmed) */
  .left-controls.open-mic .talk-row { opacity: 0.4; }
  .meter-h {
    width: 14px; min-height: 100%;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }
  .meter-h-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 0%;
    background: linear-gradient(0deg, var(--green), var(--amber) 70%, var(--magenta));
    transition: height 0.05s;
  }

  /* Left pane controls: mode toggle + threshold slider */
  .left-controls {
    display: flex; flex-direction: column; gap: 14px;
    padding: 14px 16px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .left-controls .mode-toggle {
    margin-left: 0;  /* override the header's auto-margin */
    width: 100%;
  }
  .left-controls .mode-toggle .mode-btn { flex: 1 1 50%; text-align: center; }

  .threshold-row {
    display: flex; flex-direction: column; gap: 6px;
    transition: opacity 0.2s, height 0.2s;
  }
  .left-controls.ptt .threshold-row {
    opacity: 0.4; pointer-events: none;
  }
  .threshold-label {
    display: flex; justify-content: space-between;
    font-size: 10px; letter-spacing: 0.2em; color: var(--muted);
  }
  .threshold-val {
    color: var(--cyan); font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .threshold-tick {
    display: flex; justify-content: space-between;
    font-size: 9px; color: var(--muted); opacity: 0.7;
  }
  #threshold-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%; height: 6px;
    background: linear-gradient(90deg, var(--green) 0%, var(--amber) 50%, var(--magenta) 100%);
    border-radius: 99px; outline: none; opacity: 0.85;
    margin: 4px 0;
  }
  #threshold-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--cyan);
    border: 2px solid var(--bg);
    cursor: pointer;
    box-shadow: 0 0 12px rgba(90,216,255,0.6);
  }
  #threshold-slider::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--cyan);
    border: 2px solid var(--bg);
    cursor: pointer;
    box-shadow: 0 0 12px rgba(90,216,255,0.6);
  }
</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="header">
        <div class="brand">COMPANION</div>
        <div id="status" class="pill status-idle">idle</div>
        <div class="char-picker" id="char-picker">
          <!-- populated by app.js from /api/characters -->
        </div>
        <button class="corpus-mini" id="corpus-btn"
                title="Click to run an Adaption Labs adapt cycle now. Auto-runs every 30 turns; unchanged categories are skipped.">
          <span class="corpus-mini-label">ADAPT</span>
          <span class="corpus-mini-count" id="corpus-turns">0</span>
          <span class="corpus-status" id="corpus-status">idle</span>
        </button>
      </div>
    </header>

    <section class="conversation-pane" id="left-pane">
      <div class="left-controls">
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="open">OPEN MIC</button>
          <button class="mode-btn" data-mode="ptt">PUSH TO TALK</button>
        </div>
        <div class="threshold-row" id="threshold-row">
          <div class="threshold-label">
            <span>SENSITIVITY</span>
            <span class="threshold-val" id="threshold-val">0.020</span>
          </div>
          <input type="range" id="threshold-slider"
                 min="0.005" max="0.1" step="0.005" value="0.02">
          <div class="threshold-tick">
            <span>more sensitive</span><span>less sensitive</span>
          </div>
        </div>
        <div class="talk-row">
          <button id="talk-btn" disabled>TALK</button>
          <div class="meter-h" title="mic level">
            <div class="meter-h-fill" id="meter"></div>
          </div>
        </div>
      </div>
      <h2 style="padding: 0 4px">CONVERSATION</h2>
      <div class="transcript" id="transcript">
        <div class="empty">Allow camera + microphone, then talk.</div>
      </div>
    </section>

    <main class="stage-pane">
      <div class="stage">
        <div class="avatar-wrap" id="avatar-wrap" data-emotion="neutral" data-character="rocky">
          <!-- ROCKY avatar (alien) -->
          <svg class="avatar avatar-rocky" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" aria-label="Rocky">
            <defs>
              <radialGradient id="rocky-skin" cx="35%" cy="30%">
                <stop offset="0%" stop-color="#a39076"/>
                <stop offset="55%" stop-color="#6c5640"/>
                <stop offset="100%" stop-color="#2e2419"/>
              </radialGradient>
              <radialGradient id="rocky-glow" cx="50%" cy="50%">
                <stop offset="0%" stop-color="rgba(255,180,90,0.5)"/>
                <stop offset="100%" stop-color="rgba(255,180,90,0)"/>
              </radialGradient>
              <radialGradient id="rocky-eye-glow" cx="50%" cy="50%">
                <stop offset="0%" stop-color="#fff2c0"/>
                <stop offset="60%" stop-color="#ffb24a"/>
                <stop offset="100%" stop-color="#80450a"/>
              </radialGradient>
            </defs>
            <circle class="halo" cx="160" cy="160" r="150" fill="url(#rocky-glow)"/>
            <ellipse cx="160" cy="160" rx="125" ry="135" fill="url(#rocky-skin)" stroke="#1a120a" stroke-width="3"/>
            <path d="M 60 110 Q 160 70 260 110" fill="none" stroke="#3a2c1d" stroke-width="2" opacity="0.6"/>
            <path d="M 65 195 Q 160 220 255 195" fill="none" stroke="#3a2c1d" stroke-width="2" opacity="0.6"/>

            <!-- EYES — orbital sockets with glowing pupils -->
            <g class="eye eye-left">
              <ellipse cx="115" cy="150" rx="26" ry="26" fill="#100c08" stroke="#ffb24a" stroke-width="2"/>
              <ellipse class="pupil" cx="115" cy="150" rx="11" ry="11" fill="url(#rocky-eye-glow)"/>
              <ellipse class="sparkle" cx="120" cy="145" rx="3" ry="3" fill="#fffbe0"/>
              <path class="eye-arc" d="M 90 150 Q 115 138 140 150" fill="none" stroke="#100c08" stroke-width="0" stroke-linecap="round"/>
              <path class="eye-line" d="M 90 150 L 140 150" stroke="#100c08" stroke-width="0" stroke-linecap="round"/>
            </g>
            <g class="eye eye-right">
              <ellipse cx="205" cy="150" rx="26" ry="26" fill="#100c08" stroke="#ffb24a" stroke-width="2"/>
              <ellipse class="pupil" cx="205" cy="150" rx="11" ry="11" fill="url(#rocky-eye-glow)"/>
              <ellipse class="sparkle" cx="210" cy="145" rx="3" ry="3" fill="#fffbe0"/>
              <path class="eye-arc" d="M 180 150 Q 205 138 230 150" fill="none" stroke="#100c08" stroke-width="0" stroke-linecap="round"/>
              <path class="eye-line" d="M 180 150 L 230 150" stroke="#100c08" stroke-width="0" stroke-linecap="round"/>
            </g>

            <!-- BROWS — chunky stone ridges -->
            <path class="brow brow-left"  d="M 85 113 Q 115 105 145 115" stroke="#1a120a" stroke-width="7" fill="none" stroke-linecap="round"/>
            <path class="brow brow-right" d="M 175 115 Q 205 105 235 113" stroke="#1a120a" stroke-width="7" fill="none" stroke-linecap="round"/>

            <!-- MOUTHS — only one visible at a time. Each is a separate path -->
            <g class="mouth-group" transform-origin="160 240">
              <path class="m-neutral"  d="M 130 240 Q 160 248 190 240" stroke="#1a0e06" stroke-width="5" fill="none" stroke-linecap="round"/>
              <path class="m-happy"    d="M 120 235 Q 160 270 200 235" stroke="#1a0e06" stroke-width="6" fill="#3a1d0d" stroke-linecap="round"/>
              <path class="m-amaze"    d="M 160 240 m -22 0 a 22 22 0 1 0 44 0 a 22 22 0 1 0 -44 0" stroke="#1a0e06" stroke-width="5" fill="#3a1d0d"/>
              <path class="m-sad"     d="M 120 252 Q 160 230 200 252" stroke="#1a0e06" stroke-width="6" fill="none" stroke-linecap="round"/>
              <path class="m-confused" d="M 130 245 Q 145 235 160 245 Q 175 255 190 245" stroke="#1a0e06" stroke-width="5" fill="none" stroke-linecap="round"/>
              <path class="m-sleepy"  d="M 135 240 L 185 240" stroke="#1a0e06" stroke-width="5" fill="none" stroke-linecap="round"/>
            </g>

            <!-- TEAR (sad only) -->
            <g class="tear-group">
              <path class="tear" d="M 115 178 Q 110 195 115 200 Q 120 195 115 178 Z" fill="#7ec3e0" opacity="0"/>
            </g>
            <!-- SPARKLES (amaze only) -->
            <g class="bling">
              <path d="M 60 90 L 64 80 L 68 90 L 78 94 L 68 98 L 64 108 L 60 98 L 50 94 Z" fill="#ffd47a" opacity="0"/>
              <path d="M 245 75 L 249 67 L 253 75 L 261 79 L 253 83 L 249 91 L 245 83 L 237 79 Z" fill="#ffd47a" opacity="0"/>
            </g>
          </svg>

          <!-- HANA avatar (anime girl) -->
          <svg class="avatar avatar-hana" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" aria-label="Hana">
            <defs>
              <radialGradient id="hana-skin" cx="50%" cy="40%">
                <stop offset="0%" stop-color="#fff6ee"/>
                <stop offset="100%" stop-color="#ffd9c2"/>
              </radialGradient>
              <radialGradient id="hana-glow" cx="50%" cy="50%">
                <stop offset="0%" stop-color="rgba(255,170,210,0.5)"/>
                <stop offset="100%" stop-color="rgba(255,170,210,0)"/>
              </radialGradient>
              <linearGradient id="hana-hair" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#e6a684"/>
                <stop offset="100%" stop-color="#a06854"/>
              </linearGradient>
              <radialGradient id="hana-iris" cx="50%" cy="50%">
                <stop offset="0%" stop-color="#9a78d9"/>
                <stop offset="80%" stop-color="#5a3aa5"/>
                <stop offset="100%" stop-color="#1a0e3a"/>
              </radialGradient>
            </defs>
            <circle class="halo" cx="160" cy="160" r="150" fill="url(#hana-glow)"/>

            <!-- HAIR back -->
            <ellipse cx="160" cy="180" rx="115" ry="135" fill="url(#hana-hair)"/>
            <!-- FACE -->
            <ellipse cx="160" cy="170" rx="92" ry="105" fill="url(#hana-skin)" stroke="#c98a72" stroke-width="2"/>
            <!-- BANGS -->
            <path d="M 70 105 Q 100 55 160 65 Q 220 55 250 105 Q 240 135 200 125 Q 178 138 160 122 Q 142 138 120 125 Q 80 135 70 105 Z"
                  fill="url(#hana-hair)" stroke="#7a4a3a" stroke-width="1"/>
            <!-- SIDE STRANDS -->
            <path d="M 70 130 Q 55 230 80 285" fill="url(#hana-hair)" stroke="#7a4a3a" stroke-width="1"/>
            <path d="M 250 130 Q 265 230 240 285" fill="url(#hana-hair)" stroke="#7a4a3a" stroke-width="1"/>
            <!-- AHOGE (single hair sticking up) -->
            <path d="M 158 60 Q 165 35 180 50" fill="none" stroke="#7a4a3a" stroke-width="3" stroke-linecap="round"/>

            <!-- BLUSH -->
            <ellipse class="blush blush-left"  cx="115" cy="205" rx="16" ry="8" fill="rgba(255,140,170,0.55)"/>
            <ellipse class="blush blush-right" cx="205" cy="205" rx="16" ry="8" fill="rgba(255,140,170,0.55)"/>

            <!-- EYES — big anime: white sclera, gradient iris, dark pupil, highlight -->
            <g class="eye eye-left">
              <ellipse cx="120" cy="170" rx="24" ry="30" fill="#fff" stroke="#7a4a3a" stroke-width="1"/>
              <ellipse class="pupil" cx="120" cy="172" rx="16" ry="22" fill="url(#hana-iris)"/>
              <ellipse cx="120" cy="172" rx="7" ry="9" fill="#0d0820"/>
              <ellipse class="sparkle" cx="125" cy="164" rx="5" ry="6" fill="#ffffff"/>
              <ellipse cx="115" cy="180" rx="2.5" ry="3" fill="#ffffff" opacity="0.7"/>
              <path class="eye-arc"  d="M 96 170 Q 120 152 144 170" fill="none" stroke="#5a3aa5" stroke-width="0" stroke-linecap="round"/>
              <path class="eye-line" d="M 96 170 L 144 170" stroke="#5a3aa5" stroke-width="0" stroke-linecap="round"/>
            </g>
            <g class="eye eye-right">
              <ellipse cx="200" cy="170" rx="24" ry="30" fill="#fff" stroke="#7a4a3a" stroke-width="1"/>
              <ellipse class="pupil" cx="200" cy="172" rx="16" ry="22" fill="url(#hana-iris)"/>
              <ellipse cx="200" cy="172" rx="7" ry="9" fill="#0d0820"/>
              <ellipse class="sparkle" cx="205" cy="164" rx="5" ry="6" fill="#ffffff"/>
              <ellipse cx="195" cy="180" rx="2.5" ry="3" fill="#ffffff" opacity="0.7"/>
              <path class="eye-arc"  d="M 176 170 Q 200 152 224 170" fill="none" stroke="#5a3aa5" stroke-width="0" stroke-linecap="round"/>
              <path class="eye-line" d="M 176 170 L 224 170" stroke="#5a3aa5" stroke-width="0" stroke-linecap="round"/>
            </g>

            <!-- BROWS -->
            <path class="brow brow-left"  d="M 95 137 Q 120 128 145 137" stroke="#7a4a3a" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path class="brow brow-right" d="M 175 137 Q 200 128 225 137" stroke="#7a4a3a" stroke-width="3" fill="none" stroke-linecap="round"/>

            <!-- MOUTHS -->
            <g class="mouth-group" transform-origin="160 240">
              <path class="m-neutral"  d="M 148 240 Q 160 246 172 240" stroke="#c54a7a" stroke-width="3" fill="rgba(255,160,180,0.4)" stroke-linecap="round"/>
              <path class="m-happy"    d="M 130 233 Q 160 270 190 233 Q 160 248 130 233 Z" stroke="#c54a7a" stroke-width="3" fill="rgba(255,120,150,0.7)" stroke-linecap="round"/>
              <path class="m-amaze"    d="M 160 240 m -16 0 a 16 18 0 1 0 32 0 a 16 18 0 1 0 -32 0" stroke="#c54a7a" stroke-width="3" fill="rgba(255,120,150,0.6)"/>
              <path class="m-sad"     d="M 138 250 Q 160 232 182 250" stroke="#c54a7a" stroke-width="3" fill="none" stroke-linecap="round"/>
              <path class="m-confused" d="M 142 245 Q 152 238 162 245 Q 172 252 182 245" stroke="#c54a7a" stroke-width="3" fill="none" stroke-linecap="round"/>
              <path class="m-sleepy"  d="M 148 240 L 172 240" stroke="#c54a7a" stroke-width="3" fill="none" stroke-linecap="round"/>
            </g>

            <!-- TEAR (sad only) -->
            <g class="tear-group">
              <path class="tear" d="M 120 200 Q 113 220 120 226 Q 127 220 120 200 Z" fill="#7ec3e0" opacity="0"/>
            </g>
            <!-- SPARKLES (amaze only) -->
            <g class="bling">
              <path d="M 60 90 L 64 80 L 68 90 L 78 94 L 68 98 L 64 108 L 60 98 L 50 94 Z" fill="#ffe0a0" opacity="0"/>
              <path d="M 245 75 L 249 67 L 253 75 L 261 79 L 253 83 L 249 91 L 245 83 L 237 79 Z" fill="#ff90c0" opacity="0"/>
            </g>
          </svg>
        </div>
        <div class="cam-thumb">
          <video id="video" autoplay muted playsinline></video>
          <div class="cam-label">CAM</div>
        </div>
      </div>
    </main>

    <aside class="memory-pane">
      <div class="adapt-card" id="adapt-card">
        <div class="adapt-header">
          <h2>ADAPTED</h2>
          <span class="adapt-pulse" id="adapt-pulse"></span>
        </div>
        <div class="adapt-rows" id="adapt-rows">
          <div class="adapt-row">
            <span class="adapt-key">REPLY LIMIT</span>
            <span class="adapt-val" id="adapt-words">8w</span>
          </div>
          <div class="adapt-row">
            <span class="adapt-key">SHORTER ASKED</span>
            <span class="adapt-val" id="adapt-shorter">0×</span>
          </div>
          <div class="adapt-row">
            <span class="adapt-key">FREQ TOPICS</span>
            <span class="adapt-val" id="adapt-topics">—</span>
          </div>
        </div>
      </div>

      <div class="pane-card memories-card">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <h2>MEMORIES</h2>
          <span style="display:inline-flex;gap:10px;align-items:baseline">
            <span class="memory-count" id="memory-count">0</span>
            <button id="clear-mem-btn" class="mem-clear" title="Clear all memories">CLEAR</button>
          </span>
        </div>
        <div class="memory-list" id="memories">
          <div class="empty-mem">no memories yet</div>
        </div>
      </div>
    </aside>
  </div>

  <audio id="audio"></audio>

  <!-- Memory lightbox -->
  <div id="lightbox" class="lightbox" hidden>
    <div class="lightbox-backdrop" data-close></div>
    <div class="lightbox-card">
      <button class="lightbox-close" data-close>×</button>
      <img class="lightbox-img" id="lightbox-img" alt="">
      <div class="lightbox-meta">
        <div class="lightbox-fact" id="lightbox-fact"></div>
        <div class="lightbox-when" id="lightbox-when"></div>
      </div>
    </div>
  </div>

  <script src="/static/recorder.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
