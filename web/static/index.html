<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Rocky</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #06070d;
    --bg-grad: radial-gradient(ellipse at top, #0d1421 0%, #06070d 60%);
    --panel: rgba(20, 28, 48, 0.5);
    --panel-border: rgba(120, 200, 255, 0.18);
    --cyan: #5ad8ff;
    --magenta: #ff5ad8;
    --amber: #ffc15a;
    --green: #5fffb1;
    --text: #e8eef7;
    --muted: #6c7a96;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    background: var(--bg-grad);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.015) 0px,
      rgba(255,255,255,0.015) 1px,
      transparent 1px,
      transparent 3px);
    z-index: 1000;
  }

  /* Layout: main + sidebar */
  .app {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 1fr;
    gap: 16px;
    padding: 24px;
    height: 100vh;
  }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 8px;
  }
  .brand {
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.4em;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 24px rgba(90,216,255,0.3);
  }
  .pill {
    padding: 4px 12px;
    border: 1px solid var(--panel-border);
    border-radius: 99px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--panel);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: var(--muted);
    transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .pill::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 8px currentColor;
  }
  .pill.status-idle      { color: var(--muted); }
  .pill.status-ready     { color: var(--cyan);    border-color: rgba(90,216,255,0.4); box-shadow: 0 0 16px rgba(90,216,255,0.2); }
  .pill.status-recording { color: var(--amber);   border-color: rgba(255,193,90,0.5); box-shadow: 0 0 24px rgba(255,193,90,0.4); animation: blink 1s infinite; }
  .pill.status-submitting,
  .pill.status-thinking  { color: var(--magenta); border-color: rgba(255,90,216,0.5); box-shadow: 0 0 24px rgba(255,90,216,0.4); }
  .pill.status-speaking  { color: var(--green);   border-color: rgba(95,255,177,0.5); box-shadow: 0 0 24px rgba(95,255,177,0.4); }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  /* Mode toggle (open mic / push-to-talk) */
  .mode-toggle {
    display: inline-flex;
    border: 1px solid var(--panel-border);
    border-radius: 99px;
    padding: 3px;
    background: var(--panel);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    margin-left: auto;
  }
  .mode-btn {
    padding: 5px 14px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 99px;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active {
    background: linear-gradient(135deg, rgba(90,216,255,0.18), rgba(255,90,216,0.12));
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(90,216,255,0.25);
  }

  /* Main column */
  main {
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 16px;
    min-width: 0;
  }

  /* Stage: orb + camera thumbnail */
  .stage {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 240px;
    isolation: isolate;
  }
  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 20%, rgba(90,216,255,0.12), transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(255,90,216,0.10), transparent 50%);
    z-index: -1;
  }

  /* Visualizer canvas */
  #viz {
    width: 100%;
    height: 100%;
    display: block;
  }
  .stage { min-height: 320px; }

  /* Camera thumbnail */
  .cam-thumb {
    position: absolute;
    top: 16px; right: 16px;
    width: 160px; height: 120px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--panel-border);
    background: #000;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .cam-thumb video {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror, like a video call */
  }
  .cam-label {
    position: absolute; bottom: 4px; left: 6px;
    font-size: 9px; letter-spacing: 0.2em;
    color: var(--cyan);
    text-shadow: 0 0 4px rgba(0,0,0,0.9);
  }

  /* Transcript stream — chat history */
  .transcript {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 16px 20px;
    min-height: 120px;
    max-height: 32vh;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
    font-size: 14px; line-height: 1.5;
  }
  .transcript::-webkit-scrollbar { width: 6px; }
  .transcript::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }
  .empty {
    color: var(--muted);
    text-align: center;
    padding: 24px 0;
    font-style: italic;
    font-size: 13px;
  }
  .turn { display: flex; flex-direction: column; gap: 4px; }
  .turn .you, .turn .rocky {
    padding: 8px 12px;
    border-radius: 10px;
    word-wrap: break-word;
    max-width: 88%;
  }
  .turn .you {
    align-self: flex-end;
    background: rgba(90,216,255,0.10);
    border: 1px solid rgba(90,216,255,0.25);
    color: var(--text);
  }
  .turn .you .label { color: var(--cyan); font-size: 10px; letter-spacing: 0.2em; margin-right: 8px; }
  .turn .rocky {
    align-self: flex-start;
    background: rgba(255,90,216,0.08);
    border: 1px solid rgba(255,90,216,0.22);
  }
  .turn .rocky .label { color: var(--magenta); font-size: 10px; letter-spacing: 0.2em; margin-right: 8px; }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: stretch;
  }
  #talk-btn {
    padding: 18px 24px;
    background: linear-gradient(135deg, rgba(90,216,255,0.15), rgba(255,90,216,0.15));
    color: var(--cyan);
    border: 1px solid rgba(90,216,255,0.45);
    border-radius: 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 0 24px rgba(90,216,255,0.15);
  }
  #talk-btn:hover {
    background: linear-gradient(135deg, rgba(90,216,255,0.25), rgba(255,90,216,0.25));
    box-shadow: 0 0 32px rgba(90,216,255,0.3);
  }
  #talk-btn:active { transform: scale(0.98); }
  #talk-btn.recording {
    color: var(--amber);
    border-color: rgba(255,193,90,0.7);
    background: linear-gradient(135deg, rgba(255,193,90,0.2), rgba(255,90,90,0.2));
    box-shadow: 0 0 32px rgba(255,193,90,0.4);
    animation: blink 1s infinite;
  }
  #talk-btn:disabled {
    color: var(--muted);
    border-color: rgba(108,122,150,0.3);
    background: rgba(20,28,48,0.4);
    cursor: not-allowed;
    box-shadow: none;
    animation: none;
  }

  .meter {
    width: 12px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }
  .meter-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 0%;
    background: linear-gradient(0deg, var(--green), var(--amber) 70%, var(--magenta));
    transition: height 0.05s;
  }

  /* Sidebar — memories */
  aside {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
    overflow: hidden;
  }
  aside h2 {
    margin: 0;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--cyan);
    text-shadow: 0 0 8px rgba(90,216,255,0.4);
  }
  .memory-count {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.15em;
  }
  .memory-list {
    display: flex; flex-direction: column; gap: 8px;
    overflow-y: auto;
    flex: 1;
    padding-right: 4px;
  }
  .memory-list::-webkit-scrollbar { width: 4px; }
  .memory-list::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }
  .memory {
    padding: 10px 12px;
    background: rgba(20,28,48,0.6);
    border: 1px solid rgba(120,200,255,0.12);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.4;
    transition: all 0.2s;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .memory:hover { border-color: rgba(90,216,255,0.3); }
  .memory-thumb {
    width: 44px; height: 44px;
    border-radius: 6px;
    object-fit: cover;
    border: 1px solid rgba(120,200,255,0.2);
    flex-shrink: 0;
    background: #1a1a1d;
  }
  .memory-fact { flex: 1; min-width: 0; }
  .memory.new {
    background: linear-gradient(90deg, rgba(95,255,177,0.18), rgba(90,216,255,0.1));
    border-color: rgba(95,255,177,0.5);
    color: var(--green);
    animation: chip-in 1.5s ease-out;
    box-shadow: 0 0 16px rgba(95,255,177,0.2);
  }
  @keyframes chip-in {
    0%   { transform: translateX(12px); opacity: 0; box-shadow: 0 0 32px rgba(95,255,177,0.6); }
    100% { transform: translateX(0);    opacity: 1; box-shadow: 0 0 16px rgba(95,255,177,0.2); }
  }
  .empty-mem {
    color: var(--muted);
    font-size: 11px;
    font-style: italic;
    text-align: center;
    padding: 16px 0;
  }
</style>
</head>
<body>
  <div class="app">
    <main>
      <div class="header">
        <div class="brand">ROCKY</div>
        <div id="status" class="pill status-idle">idle</div>
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="open">OPEN MIC</button>
          <button class="mode-btn" data-mode="ptt">PUSH TO TALK</button>
        </div>
      </div>

      <div class="stage">
        <canvas id="viz"></canvas>
        <div class="cam-thumb">
          <video id="video" autoplay muted playsinline></video>
          <div class="cam-label">CAM</div>
        </div>
      </div>

      <div class="transcript" id="transcript">
        <div class="empty">Allow camera + microphone, click TALK, say hello.</div>
      </div>

      <div class="controls">
        <button id="talk-btn" disabled>TALK</button>
        <div class="meter" title="mic level"><div class="meter-fill" id="meter"></div></div>
      </div>
    </main>

    <aside>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <h2>MEMORIES</h2>
        <span class="memory-count" id="memory-count">0</span>
      </div>
      <div class="memory-list" id="memories">
        <div class="empty-mem">no memories yet</div>
      </div>
    </aside>
  </div>

  <audio id="audio"></audio>
  <script src="/static/recorder.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
