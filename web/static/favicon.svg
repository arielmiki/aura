<?xml version="1.0" encoding="UTF-8"?>
<!-- Aura favicon. Mirrors the hero sphere: dark warm-purple bg, aurora
     gradient core (lavender → cyan → rose), soft outer halo, thin ring. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Bright aurora core -->
    <radialGradient id="core" cx="50%" cy="42%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="32%"  stop-color="#a89bff"/>
      <stop offset="68%"  stop-color="#62d4ff"/>
      <stop offset="100%" stop-color="#ff85c1"/>
    </radialGradient>
    <!-- Soft outer halo -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a89bff" stop-opacity="0.65"/>
      <stop offset="55%"  stop-color="#62d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff85c1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square dark backdrop (works as both circle and square favicon) -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#0a0816"/>

  <!-- Outer halo wash -->
  <circle cx="16" cy="16" r="13" fill="url(#halo)"/>

  <!-- Thin orbital ring -->
  <circle cx="16" cy="16" r="11" fill="none"
          stroke="#a89bff" stroke-opacity="0.42" stroke-width="0.6"/>

  <!-- Bright core -->
  <circle cx="16" cy="14.5" r="5.4" fill="url(#core)"/>

  <!-- Highlight glint -->
  <ellipse cx="14" cy="12" rx="1.6" ry="1" fill="#ffffff" fill-opacity="0.55"/>
</svg>
